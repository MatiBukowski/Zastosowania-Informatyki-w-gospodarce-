name: Build Android Mobile App

on:
  push:
    branches: [ main ]
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'backend/**', 'frontend/web/**' ]
  pull_request:
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'backend/**', 'frontend/web/**' ]
  workflow_dispatch:

env:
  EXPO_PUBLIC_API_URL: https://xederro.tech
  EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
  EXPO_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com


jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Cache Expo Prebuild
        id: cache-expo-prebuild
        uses: actions/cache@v4
        with:
          path: |
            frontend/mobile/android
            frontend/mobile/.expo
          key: ${{ runner.os }}-expo-prebuild-${{ hashFiles('frontend/mobile/package-lock.json', 'frontend/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-prebuild-

      - name: Prebuild Android
        if: steps.cache-expo-prebuild.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/mobile/android/app/build/outputs/apk/release/*.apk
