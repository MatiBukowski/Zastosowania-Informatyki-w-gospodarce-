name: CI/CD pipeline for frontend code
on:
  push:
    branches: [ main ]
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'backend/**', 'frontend/mobile/**' ]
  pull_request:
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'backend/**', 'frontend/mobile/**' ]
  workflow_dispatch:

env:
  VITE_API_URL: https://xederro.tech
  VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_API_KEY }}
  VITE_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zig-frontend:${{ github.event_name }}_${{ github.run_id }}
            ${{ github.ref_name == 'main' && format('{0}/zig-frontend:latest', secrets.DOCKERHUB_USERNAME) || '' }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update VPS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf .git
          mkdir cicd
          cd cicd
          git clone "https://x-access-token:${{ secrets.TOKEN_VPS_REPO }}@github.com/xederro/CICD-VPS.git" --depth=1
          cd CICD-VPS
          git config --global user.name 'Dawid Jabłoński'
          git config --global user.email 'xederro@gmail.com'
          git config --unset-all http.https://github.com/.extraheader || true
          sed -i 's|xederro/zig-frontend:\w\+|xederro/zig-frontend:${{ github.event_name }}_${{ github.run_id }}|g' docker-stack.yml
          git add .
          git commit -m"ZIG frontend Update: $(date)"
          git push