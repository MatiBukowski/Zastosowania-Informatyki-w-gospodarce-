name: CI/CD pipeline for successful merge of backend code
on:
  push:
    branches: [ main ]
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'frontend/**' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zig-backend:${{ github.event_name }}_${{ github.run_id }}
            ${{ github.ref_name == 'main' && format('{0}/zig-backend:latest', secrets.DOCKERHUB_USERNAME) || '' }}
