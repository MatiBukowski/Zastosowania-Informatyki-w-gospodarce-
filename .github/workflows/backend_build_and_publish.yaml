name: CI/CD pipeline for backend code
on:
  push:
    branches: [ main ]
    paths-ignore: [ '.github/**', 'README.md', '.gitignore', 'Documentation/**', 'frontend/**' ]
  pull_request:
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test the code
        run: |
          cd backend
          pip install -r requirements.txt
          pytest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zig-backend:${{ github.event_name }}_${{ github.run_id }}
            ${{ github.ref_name == 'main' && format('{0}/zig-backend:latest', secrets.DOCKERHUB_USERNAME) || '' }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Run alembic migrations
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          cd backend
          pip install -r requirements.txt
          alembic upgrade head

      - name: Update VPS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf .git
          mkdir cicd
          cd cicd
          git clone "https://x-access-token:${{ secrets.TOKEN_VPS_REPO }}@github.com/xederro/CICD-VPS.git" --depth=1
          cd CICD-VPS
          git config --global user.name 'Dawid Jabłoński'
          git config --global user.email 'xederro@gmail.com'
          git config --unset-all http.https://github.com/.extraheader || true
          sed -i 's|xederro/zig-backend:\w\+|xederro/zig-backend:${{ github.event_name }}_${{ github.run_id }}|g' docker-stack.yml
          git add .
          git commit -m"ZIG backend Update: $(date)"
          git push